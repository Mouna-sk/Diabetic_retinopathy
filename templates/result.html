<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f3e5f5;
            color: #333;
            text-align: center;
            padding: 30px;
        }
        h1 {
            color: #6a1b9a;
            font-size: 2em;
            margin-bottom: 20px;
        }
        .result-container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: auto;
        }
        img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
        }
        .prediction {
            font-size: 1.2em;
            margin-bottom: 15px;
        }
        .highlight {
            background-color: #d500f9;
            color: #ffffff;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 1.3em;
            display: inline-block;
            border: 2px solid #8e24aa;
        }
        h2 {
            color: #6a1b9a;
            font-size: 1.6em;
            margin-top: 25px;
        }
        ul {
            list-style-type: none;
            padding: 0;
            margin: 15px 0;
        }
        li {
            background-color: #ede7f6;
            border: 1px solid #ab47bc;
            border-radius: 4px;
            padding: 8px 12px;
            margin: 8px 0;
            font-size: 1em;
            display: inline-block;
            width: calc(50% - 16px);
            margin-right: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        li:nth-child(odd) {
            margin-right: 0;
        }
        a {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            color: white;
            background-color: #6a1b9a;
            padding: 10px 20px;
            border-radius: 4px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-size: 1.1em;
        }
        a:hover {
            background-color: #4a148c;
            transform: scale(1.05);
        }
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }
            h1 {
                font-size: 1.8em;
            }
            .result-container {
                padding: 15px;
            }
            ul {
                display: block;
            }
            li {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>Prediction Result</h1>
    <div class="result-container">
        <img src="{{ img_path }}" alt="Uploaded Image">
        <p class="prediction">Predicted Class: <span class="highlight">{{ predicted_label }}</span></p>
        <h2>Class Probabilities:</h2>
        <ul>
            {% for i in range(class_labels|length) %}
                <li>{{ class_labels[i] }}: {{ probabilities[i] | round(4) }}</li>
            {% endfor %}
        </ul>
        <a href="/" aria-label="Go back to the homepage">Go Back</a>
    </div>
</body>
</html>
